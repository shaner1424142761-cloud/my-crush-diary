<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱 Blog · 专属心动空间</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/blog.css">
</head>
<body>
    <div id="syncStatus">☁️ 连接云端中...</div>

    <div class="container">
        <nav class="site-nav" aria-label="主导航">
            <a href="index.html" class="site-nav__link">随手记</a>
            <a href="album.html" class="site-nav__link">回忆相册</a>
            <a href="blog.html" class="site-nav__link site-nav__link--current">恋爱 Blog</a>
        </nav>

        <main>
            <div class="panel panel-blog">
                <h2>📔 恋爱 Blog</h2>
                <p class="framework-hint">长一点的日记、纪念日、旅行记录可以写在这里；随手一句仍适合放在「随手记」里的悄悄话。</p>
                <div class="blog-form">
                    <input type="text" id="blog-title" placeholder="标题" maxlength="60">
                    <textarea id="blog-body" placeholder="正文..." maxlength="4000"></textarea>
                    <button type="button" class="btn-blog" id="btn-publish-blog">发布到 Blog</button>
                </div>
                <div class="history-title" style="margin-top:16px;">最近文章</div>
                <div class="blog-list" id="blog-list"></div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/store.js"></script>
    <script src="js/merge.js"></script>
    <script src="js/ui/sync-bar.js"></script>
    <script src="js/util/time.js"></script>
    <script src="js/ui/love-calendar.js"></script>
    <script src="js/ui/render-blog.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/blog.js"></script>
</body>
</html>
