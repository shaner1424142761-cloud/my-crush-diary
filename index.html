<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>galgame里就是这样的！！！</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <header class="app-topbar" role="banner">
        <div class="app-topbar__inner">
            <span id="side-menu-toggle-host" class="app-topbar__menu-host"></span>
            <a href="index.html" class="app-topbar__brand">心动手记</a>
            <div class="app-topbar__actions" role="toolbar" aria-label="页面操作">
                <button type="button" class="app-topbar__icon-btn" id="btn-topbar-refresh" title="刷新" aria-label="刷新">
                    <svg class="app-topbar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
                <button type="button" class="app-topbar__icon-btn" id="btn-topbar-back" title="返回" aria-label="返回上一页">
                    <svg class="app-topbar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <a href="index.html" class="app-topbar__icon-btn" title="首页" aria-label="回到首页">
                    <svg class="app-topbar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </a>
            </div>
        </div>
    </header>
    <div class="app-topbar-spacer" aria-hidden="true"></div>

    <div id="syncStatus">☁️ 连接云端中...</div>

    <div class="container">
        <main>
            <header class="home-page-title">
                <h1 class="home-page-title__main">随手记</h1>
                <p class="home-page-title__sub">好感度打分与记账本；悄悄话请从侧栏进入 💌</p>
            </header>
            <div class="panel panel-ta">
                <h2>YYF 的得分</h2>
                <p class="subtitle">ZXR给YYF打的分，目前好感度</p>
                <div class="score" id="score-ta">...</div>

                <div class="custom-input-group">
                    <input type="text" id="reason-ta" class="input-reason" placeholder="原因 (例: 带了奶茶)" maxlength="20">
                    <input type="number" id="input-score-ta" class="input-score" placeholder="分数">
                    <button type="button" class="btn-custom" id="btn-record-ta">记录</button>
                </div>

                <div class="btn-group">
                    <button type="button" class="quick-btn" id="btn-ta-plus5">超棒 (+5)</button>
                    <button type="button" class="quick-btn" id="btn-ta-plus2">秒回 (+2)</button>
                    <button type="button" class="quick-btn btn-negative" id="btn-ta-minus3">惹生气 (-3)</button>
                </div>

                <div class="history-title">📝 记账本</div>
                <div class="history" id="history-ta"></div>
            </div>

            <div class="panel panel-my">
                <h2>ZXR 的得分</h2>
                <p class="subtitle">YYF给ZXR打的分，求生欲测试</p>
                <div class="score" id="score-my">...</div>

                <div class="custom-input-group">
                    <input type="text" id="reason-my" class="input-reason" placeholder="原因 (例: 今天很可爱)" maxlength="20">
                    <input type="number" id="input-score-my" class="input-score" placeholder="分数">
                    <button type="button" class="btn-custom" id="btn-record-my">记录</button>
                </div>

                <div class="btn-group">
                    <button type="button" class="quick-btn" id="btn-my-plus5">超可爱 (+5)</button>
                    <button type="button" class="quick-btn" id="btn-my-plus2">贴心 (+2)</button>
                    <button type="button" class="quick-btn btn-negative" id="btn-my-minus3">小脾气 (-3)</button>
                </div>

                <div class="history-title">📝 记账本</div>
                <div class="history" id="history-my"></div>
            </div>
        </main>
    </div>

    <!-- 普通 script 链：避免 file:// 下 ES module 子文件被浏览器拦截导致脚本完全不执行 -->
    <script src="js/config.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/store.js"></script>
    <script src="js/merge.js"></script>
    <script src="js/ui/nav-read-state.js"></script>
    <script src="js/ui/sync-bar.js"></script>
    <script src="js/ui/side-menu.js"></script>
    <script src="js/ui/topbar-actions.js"></script>
    <script src="js/util/time.js"></script>
    <script src="js/ui/love-calendar.js"></script>
    <script src="js/ui/render-home.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/home.js"></script>
    <script src="js/ui/footer-quote.js"></script>
</body>
</html>
