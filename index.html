<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>galgame里就是这样的！！！</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <div id="syncStatus">☁️ 连接云端中...</div>

    <div class="container">
        <nav class="site-nav" aria-label="主导航">
            <a href="index.html" class="site-nav__link site-nav__link--current">随手记</a>
            <a href="album.html" class="site-nav__link">回忆相册</a>
            <a href="blog.html" class="site-nav__link">恋爱 Blog</a>
        </nav>

        <main>
            <div class="panel panel-ta">
                <h2>YYF 的得分</h2>
                <p class="subtitle">ZXR给YYF打的分，目前好感度</p>
                <div class="score" id="score-ta">...</div>

                <div class="custom-input-group">
                    <input type="text" id="reason-ta" class="input-reason" placeholder="原因 (例: 带了奶茶)" maxlength="20">
                    <input type="number" id="input-score-ta" class="input-score" placeholder="分数">
                    <button type="button" class="btn-custom" id="btn-record-ta">记录</button>
                </div>

                <div class="btn-group">
                    <button type="button" class="quick-btn" id="btn-ta-plus5">超棒 (+5)</button>
                    <button type="button" class="quick-btn" id="btn-ta-plus2">秒回 (+2)</button>
                    <button type="button" class="quick-btn btn-negative" id="btn-ta-minus3">惹生气 (-3)</button>
                </div>

                <div class="history-title">📝 记账本</div>
                <div class="history" id="history-ta"></div>
            </div>

            <div class="panel panel-my">
                <h2>ZXR 的得分</h2>
                <p class="subtitle">YYF给ZXR打的分，求生欲测试</p>
                <div class="score" id="score-my">...</div>

                <div class="custom-input-group">
                    <input type="text" id="reason-my" class="input-reason" placeholder="原因 (例: 今天很可爱)" maxlength="20">
                    <input type="number" id="input-score-my" class="input-score" placeholder="分数">
                    <button type="button" class="btn-custom" id="btn-record-my">记录</button>
                </div>

                <div class="btn-group">
                    <button type="button" class="quick-btn" id="btn-my-plus5">超可爱 (+5)</button>
                    <button type="button" class="quick-btn" id="btn-my-plus2">贴心 (+2)</button>
                    <button type="button" class="quick-btn btn-negative" id="btn-my-minus3">小脾气 (-3)</button>
                </div>

                <div class="history-title">📝 记账本</div>
                <div class="history" id="history-my"></div>
            </div>

            <div class="panel panel-msg">
                <h2>💌 悄悄话留言板 <span class="msg-count" id="msg-counter">0/50</span></h2>
                <p class="subtitle">有什么想对彼此说的，写在这里吧</p>

                <div class="msg-list" id="msg-list">
                    <div style="color:#aaa; text-align:center; font-size:12px; margin-top:20px;">加载中…</div>
                </div>

                <div class="msg-input-box">
                    <input type="text" id="msg-input" placeholder="输入你想说的话..." maxlength="50">
                    <button type="button" id="btn-msg-send">发送留言 🚀</button>
                </div>

                <button type="button" class="export-btn" id="btn-msg-export">📥 导出并保存过往留言</button>
            </div>
        </main>
    </div>

    <!-- 普通 script 链：避免 file:// 下 ES module 子文件被浏览器拦截导致脚本完全不执行 -->
    <script src="js/config.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/store.js"></script>
    <script src="js/merge.js"></script>
    <script src="js/ui/sync-bar.js"></script>
    <script src="js/util/time.js"></script>
    <script src="js/ui/love-calendar.js"></script>
    <script src="js/ui/render-home.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/home.js"></script>
</body>
</html>
