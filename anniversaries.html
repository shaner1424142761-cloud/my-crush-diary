<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纪念日 · 心动手记</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/anniversaries.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <header class="app-topbar" role="banner">
        <div class="app-topbar__inner">
            <span id="side-menu-toggle-host" class="app-topbar__menu-host"></span>
            <a href="index.html" class="app-topbar__brand">心动手记</a>
            <div class="app-topbar__actions" role="toolbar" aria-label="页面操作">
                <button type="button" class="app-topbar__icon-btn" id="btn-topbar-refresh" title="刷新" aria-label="刷新">
                    <svg class="app-topbar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
                <button type="button" class="app-topbar__icon-btn" id="btn-topbar-back" title="返回" aria-label="返回上一页">
                    <svg class="app-topbar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <a href="index.html" class="app-topbar__icon-btn" title="首页" aria-label="回到首页">
                    <svg class="app-topbar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </a>
            </div>
        </div>
    </header>
    <div class="app-topbar-spacer" aria-hidden="true"></div>

    <div id="syncStatus">☁️ 连接云端中...</div>

    <div class="container">
        <main>
            <div class="panel panel-anniv">
                <h2>💝 纪念日</h2>
                <p class="framework-hint">记下对你们有意义的那一天（每年重复提醒）；从侧栏菜单可进入本页，与云端同步。</p>
                <div class="anniv-form">
                    <input type="text" id="anniv-title" placeholder="例如：在一起、第一次约会" maxlength="40" autocomplete="off">
                    <input type="date" id="anniv-date" aria-label="纪念日日期">
                    <textarea id="anniv-note" placeholder="备注（可选）" maxlength="160"></textarea>
                    <button type="button" class="btn-anniv-add" id="btn-add-anniv">添加纪念日</button>
                </div>
                <div class="history-title" style="margin-top:4px;">全部纪念日（按下次到来排序）</div>
                <div class="anniv-list" id="anniv-list"></div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/store.js"></script>
    <script src="js/merge.js"></script>
    <script src="js/ui/sync-bar.js"></script>
    <script src="js/ui/side-menu.js"></script>
    <script src="js/ui/topbar-actions.js"></script>
    <script src="js/util/time.js"></script>
    <script src="js/ui/love-calendar.js"></script>
    <script src="js/ui/render-anniversaries.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/anniversaries.js"></script>
    <script src="js/ui/footer-quote.js"></script>
</body>
</html>
